<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GETNOSKILL</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

height:100vh;
overflow:hidden;

background:

linear-gradient(
rgba(0,0,0,.75),
rgba(20,0,40,.8)
),

url("DEIN-ZOMBIE-BILD-HIER.jpg");


background-size:cover;

background-position:center;


display:flex;

justify-content:center;

align-items:center;

color:white;

}



/* Aether Licht */

body::after{

content:"";

position:absolute;

width:600px;

height:600px;


background:

radial-gradient(
circle,
rgba(150,0,255,.5),
transparent 65%
);


filter:blur(80px);


animation:aether 5s infinite alternate;

}



@keyframes aether{

from{

transform:scale(.8);

}

to{

transform:scale(1.3);

}

}



/* Hauptbereich */


.container{

position:relative;

z-index:2;

text-align:center;

}



/* GETNOSKILL */

.logo{


font-size:70px;

font-weight:900;

letter-spacing:10px;


color:white;



text-shadow:

0 0 20px white,
0 0 50px purple,
0 0 100px #8a00ff;



/*
HIER ÄNDERST DU SPÄTER DIE ANIMATION
*/

animation:

logoAnimation 2s infinite;


}





/* DEINE LOGO ANIMATION */

@keyframes logoAnimation{


0%{


transform:translateX(-500px);

opacity:0;


}



50%{


transform:translateX(0);


opacity:1;


}



100%{


transform:translateX(0);


}



}





.subtitle{


margin-top:25px;


font-size:20px;

letter-spacing:6px;


color:#ddd;


}




.button{


display:inline-block;


margin-top:50px;


padding:18px 60px;


background:

linear-gradient(
45deg,
#6200ff,
#d000ff
);



color:white;


text-decoration:none;


font-weight:bold;


box-shadow:

0 0 30px purple;


transition:.3s;


}



.button:hover{

transform:scale(1.1);

}





/* Bildschirm Effekt */

.scan{


position:absolute;

width:100%;

height:100%;


background:

linear-gradient(
transparent,
rgba(255,255,255,.05),
transparent
);


animation:

scan 3s infinite;


}



@keyframes scan{


from{

transform:translateY(-100%);

}


to{

transform:translateY(100%);

}


}



</style>


</head>



<body>


<div class="scan"></div>



<div class="container">


<h1 class="logo">

GETNOSKILL

</h1>



<div class="subtitle">

AETHER GAMING

<br>

CALL OF DUTY CREATOR

</div>



<a class="button" href="home.html">

ENTER

</a>



</div>



</body>


</html>
